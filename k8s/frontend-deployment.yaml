apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: fashion
spec:
  replicas: 2
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      containers:
        - name: frontend
          image: ACCOUNT_ID.dkr.ecr.ap-south-1.amazonaws.com/fashion-frontend:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 80